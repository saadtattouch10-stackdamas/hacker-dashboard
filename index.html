<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAMAS OS // Cracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            height: 100vh;
            overflow: hidden;
        }
        #startScreen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #startBtn {
            background: transparent;
            border: 2px solid #00ff00;
            color: #00ff00;
            padding: 15px 30px;
            font-size: 18px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            text-shadow: 0 0 10px #00ff00;
            box-shadow: 0 0 20px #00ff00;
        }
        #matrix {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            display: none;
        }
        #terminal {
            position: relative;
            z-index: 2;
            padding: 20px;
            font-size: 14px;
            line-height: 1.4;
            white-space: pre-wrap;
            background: rgba(0,0,0,0.85);
            height: 100vh;
            overflow-y: auto;
            display: none;
        }
        #inputLine {
            display: flex;
            align-items: center;
        }
        #userInput {
            background: transparent;
            border: none;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            outline: none;
            flex: 1;
            text-shadow: 0 0 5px #00ff00;
        }
   .cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: #00ff00;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
   .green { color: #00ff00; text-shadow: 0 0 5px #00ff00; }
   .red { color: #ff0000; text-shadow: 0 0 5px #ff0000; }
   .yellow { color: #ffff00; text-shadow: 0 0 5px #ffff00; }
   .cyan { color: #00ffff; text-shadow: 0 0 5px #00ffff; }
   .purple { color: #ff00ff; text-shadow: 0 0 5px #ff00ff; }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); text-shadow: 2px 0 #ff0000, -2px 0 #00ffff; }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
   .glitch { animation: glitch 0.3s; }
    </style>
</head>
<body>
    <div id="startScreen">
        <div style="margin-bottom:30px; text-align:center;">
            <div class="cyan">DAMAS OS v4.0 CRACKER EDITION</div>
            <div class="red">UNAUTHORIZED ACCESS DETECTED</div>
        </div>
        <button id="startBtn">[ INITIATE BREACH ]</button>
    </div>

    <canvas id="matrix"></canvas>
    <div id="terminal"></div>

    <script>
        const startScreen = document.getElementById('startScreen');
        const startBtn = document.getElementById('startBtn');
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        const terminal = document.getElementById('terminal');

        let audioCtx;
        function playKeySound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.value = 600 + Math.random() * 600;
            gain.gain.value = 0.03;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.03);
        }

        function playSuccessSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = 880;
            gain.gain.value = 0.1;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        startBtn.onclick = () => {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            startScreen.style.display = 'none';
            canvas.style.display = 'block';
            terminal.style.display = 'block';
            initMatrix();
            setTimeout(startCracker, 1000);
        };

        function initMatrix() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const chars = '01DAMAS';
            const fontSize = 14;
            const columns = canvas.width / fontSize;
            const drops = Array(Math.floor(columns)).fill(1);
            function drawMatrix() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#00ff00';
                ctx.font = fontSize + 'px monospace';
                for (let i = 0; i < drops.length; i++) {
                    const text = chars[Math.floor(Math.random() * chars.length)];
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }
            setInterval(drawMatrix, 35);
        }

        let terminalContent = '';
        let isRunning = false;

        function print(text, newLine = true) {
            terminalContent += text + (newLine? '\n' : '');
            terminal.innerHTML = terminalContent;
            terminal.scrollTop = terminal.scrollHeight;
            playKeySound();
        }

        function startCracker() {
            print('<span class="cyan">DAMAS OS v4.0 CRACKER</span> - Initializing...');
            print('<span class="red">[WARNING]</span> Brute force module loaded');
            print('<span class="green">[OK]</span> VPN: CONNECTED // TUNIS');
            print('<span class="green">[OK]</span> Proxy chains: ACTIVE');
            print('');
            print('<span class="yellow">[ROOT@damas]</span>#./hydra --crack');
            print('Enter target password to simulate crack:');
            print('<div id="inputLine"><span class="yellow">[TARGET]</span># <input type="text" id="userInput" autofocus><span class="cursor"></span></div>');

            const input = document.getElementById('userInput');
            input.focus();
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' &&!isRunning) {
                    const password = input.value;
                    if (password) crackPassword(password);
                }
            });
        }

        async function crackPassword(target) {
            isRunning = true;
            document.getElementById('inputLine').remove();
            print(`<span class="yellow">[TARGET]</span># ${target}`);
            print('');
            print('<span class="cyan">[INIT]</span> Starting brute force attack...');
            print('<span class="cyan">[INIT]</span> Charset: abcdefghijklmnopqrstuvwxyz0123456789');
            print('<span class="cyan">[INIT]</span> Target hash: MD5');
            print('');

            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            let cracked = '';

            for (let i = 0; i < target.length; i++) {
                print(`<span class="yellow">[ATTACK]</span> Cracking position ${i + 1}/${target.length}...`, false);
                await sleep(300);

                // محاكاة التجربة
                for (let j = 0; j < 15; j++) {
                    let attempt = cracked + chars[Math.floor(Math.random() * chars.length)];
                    terminalContent = terminalContent.replace(/Cracking position.*/, `Cracking position ${i + 1}/${target.length}... [${attempt}]`);
                    terminal.innerHTML = terminalContent;
                    playKeySound();
                    await sleep(50);
                }

                cracked += target[i];
                terminalContent = terminalContent.replace(/Cracking position.*/, `Cracking position ${i + 1}/${target.length}... <span class="green">[${cracked}]</span>`);
                terminal.innerHTML = terminalContent;
                playSuccessSound();
                await sleep(400);
                print('');
            }

            terminal.classList.add('glitch');
            await sleep(300);
            terminal.classList.remove('glitch');

            print('');
            print('<span class="red">[SUCCESS]</span> Password cracked!');
            print(`<span class="green">[+] Hash broken:</span> <span class="purple">${target}</span>`);
            print(`<span class="green">[+] Time elapsed:</span> ${(target.length * 1.7).toFixed(2)}s`);
            print(`<span class="green">[+] Attempts:</span> ${Math.floor(Math.random() * 90000 + 10000)}`);
            print('');
            print('<span class="cyan">Reality is just a password... and we have the key 🔓</span>');
            print('');
            print('<span class="yellow">[ROOT@damas]</span>#./hydra --crack');
            print('Enter target password to simulate crack:');
            print('<div id="inputLine"><span class="yellow">[TARGET]</span># <input type="text" id="userInput" autofocus><span class="cursor"></span></div>');

            isRunning = false;
            const input = document.getElementById('userInput');
            input.focus();
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' &&!isRunning) {
                    const password = input.value;
                    if (password) crackPassword(password);
                }
            });
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
