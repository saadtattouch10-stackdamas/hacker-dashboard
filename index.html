<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DAMAS TERMINAL</title>
  <style>
    body {
      background: #000;
      color: #00ff00;
      font-family: 'Courier New', monospace;
      margin: 0;
      padding: 20px;
    }
    #output {
      height: 80vh;
      overflow-y: auto;
      border: 1px solid #00ff00;
      padding: 10px;
      margin-bottom: 10px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    #inputArea {
      display: flex;
      gap: 10px;
    }
    #commandInput {
      flex: 1;
      background: #111;
      color: #00ff00;
      border: 1px solid #00ff00;
      padding: 10px;
      font-family: inherit;
      font-size: 16px;
      outline: none;
    }
    #sendBtn {
      background: #00ff00;
      color: #000;
      border: none;
      padding: 10px 20px;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
    }
    #sendBtn:hover {
      background: #00cc00;
    }
  </style>
</head>
<body>
  <div id="output">DAMAS TERMINAL v2.0\nاكتب help للمساعدة\nاكتب api سؤالك للتحدث مع DAMAS AI\n</div>
  <div id="inputArea">
    <input id="commandInput" type="text" placeholder="اكتب الأمر هنا..." autofocus>
    <button id="sendBtn">Send</button>
  </div>

  <script>
    const output = document.getElementById('output');
    const input = document.getElementById('commandInput');
    const sendBtn = document.getElementById('sendBtn');

    function print(text, color = '#00ff00') {
      const div = document.createElement('div');
      div.style.color = color;
      div.textContent = text;
      output.appendChild(div);
      output.scrollTop = output.scrollHeight;
    }

    async function handleCommand() {
      const command = input.value.trim();
      if (!command) return;

      print(`# ${command}`, '#00ff00');
      input.value = '';

      if (command === 'help') {
        print('الأوامر المتاحة:\nhelp - المساعدة\nclear - مسح الشاشة\napi سؤالك - تحدث مع DAMAS AI', 'yellow');
        return;
      }

      if (command === 'clear') {
        output.innerHTML = '';
        return;
      }

      if (command.startsWith('api ')) {
        print('...Connecting to DAMAS AI', 'yellow');

        try {
          let userPrompt = command.substring(4).trim();

          if (!userPrompt) {
            throw new Error('اكتب سؤالك بعد api يا معلم');
          }

          const res = await fetch('/api/ai', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              messages: [
                {role: 'system', content: 'You are DAMAS AI, a helpful hacker assistant from Tunisia. Answer in Tunisian dialect using Arabic script. Be friendly and a bit sarcastic.'},
                {role: 'user', content: userPrompt}
              ]
            })
          });

          const data = await res.json();

          if (data.error) {
            print(`خطأ من السارفر: ${data.error}`, 'red');
            return;
          }

          if (!data.choices ||!data.choices[0] ||!data.choices[0].message) {
            print('السارفر رجع رد فارغ. جرب مرة اخرى', 'red');
            return;
          }

          const reply = data.choices[0].message.content;
          print(reply, '#00ff00');

        } catch (err) {
          print(`خطأ: ${err.message}`, 'red');
        }
        return;
      }

      print(`أمر غير معروف: ${command}`, 'red');
    }

    sendBtn.addEventListener('click', handleCommand);

    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleCommand();
    });
  </script>
</body>
</html>
