<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAMAS OS v6.4</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; padding: 10px; }
        .green { color: #0f0; }
        .purple { color: #c678dd; }
        .red { color: #e06c75; }
        #terminal { white-space: pre-wrap; min-height: 80vh; margin-bottom: 10px; }
        .input-line { display: flex; align-items: center; }
        .terminal-input { background: #111; border: 1px solid #0f0; color: #0f0; flex: 1; padding: 5px; outline: none; }
        .send-btn { background:#0f0; color:#000; border:none; padding:5px 15px; margin-left:5px; cursor:pointer; font-weight:bold; }
        .send-btn:hover { background:#0c0; }
        .thinking { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="terminal"></div>
    <div class="input-line" id="input-container">
        <span class="prompt"># </span>
        <input type="text" class="terminal-input" id="cmdInput" placeholder="اكتب 'api' باش تكلم السيرفر">
        <button class="send-btn" onclick="handleCommand()">Send</button>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const input = document.getElementById('cmdInput');
        const inputContainer = document.getElementById('input-container');
        let terminalContent = '';
        let chatHistory = [];

        function addLine(text, className = '') {
            terminalContent += `<span class="${className}">${text}</span>\n`;
            terminal.innerHTML = terminalContent;
            window.scrollTo(0, document.body.scrollHeight);
        }

        function handleCommand() {
            const cmd = input.value.trim();
            if (!cmd) return;
            
            addLine(`# ${cmd}`, 'purple');
            input.value = '';
            
            if (cmd === 'clear') {
                terminalContent = '';
                terminal.innerHTML = '';
                return;
            }
            
            if (cmd === 'api') {
                callAPI();
            } else if (cmd === 'help') {
                addLine('الأوامر المتاحة:', 'green');
                addLine('api   - يكلم الـ API ويغلب الـ Boss', 'green');
                addLine('clear - يمسح الـ terminal', 'green');
                addLine('help  - يظهر المساعدة هاذي', 'green');
            } else {
                addLine(`Command not found: ${cmd}`, 'red');
            }
        }

        async function callAPI() {
            addLine('نحاولو نغلبو الـ Boss...', 'green');
            addLine('Connecting...', 'thinking');
            
            try {
                const res = await fetch('/api/data') // هذا يمشي عبر vercel.json proxy
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                
                const data = await res.json();
                // نحي سطر thinking
                terminalContent = terminalContent.replace(/<span class="thinking">.*<\/span>\n/, '');
                terminal.innerHTML = terminalContent;
                
                addLine('غلبنا الـ Boss بنجاح! 🎉', 'green');
                addLine(JSON.stringify(data, null, 2), 'purple');
                
            } catch (err) {
                terminalContent = terminalContent.replace(/<span class="thinking">.*<\/span>\n/, '');
                terminal.innerHTML = terminalContent;
                
                addLine(`الـ Boss ضربنا: ${err.message}`, 'red');
                addLine('باش نعاود المحاولة بعد 2 ثواني...', 'red');
                setTimeout(callAPI, 2000);
            }
        }

        // Enter key support
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleCommand();
        });

        // بداية
        addLine('DAMAS OS v6.4 - Level 99 Edition', 'green');
        addLine('اكتب "help" باش تشوف الأوامر', 'green');
        addLine('اكتب "api" باش تهاجم الـ Boss', 'purple');
        addLine('----------------------------------', 'green');
    </script>
</body>
</html>
