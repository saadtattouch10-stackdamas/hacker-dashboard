<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAMAS OS // AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            height: 100vh;
            overflow: hidden;
        }
        #startScreen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #startBtn {
            background: transparent;
            border: 2px solid #00ff00;
            color: #00ff00;
            padding: 15px 30px;
            font-size: 18px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            text-shadow: 0 0 10px #00ff00;
            box-shadow: 0 0 20px #00ff00;
        }
        #matrix {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            display: none;
        }
        #terminal {
            position: relative;
            z-index: 2;
            padding: 20px;
            font-size: 14px;
            line-height: 1.4;
            white-space: pre-wrap;
            background: rgba(0,0,0,0.85);
            height: 100vh;
            overflow-y: auto;
            display: none;
        }
        #inputLine {
            display: flex;
            align-items: center;
            margin-top: 10px;
        }
        #userInput {
            background: transparent;
            border: none;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            outline: none;
            flex: 1;
            text-shadow: 0 0 5px #00ff00;
        }
  .cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: #00ff00;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
  .green { color: #00ff00; text-shadow: 0 0 5px #00ff00; }
  .red { color: #ff0000; text-shadow: 0 0 5px #ff0000; }
  .yellow { color: #ffff00; text-shadow: 0 0 5px #ffff00; }
  .cyan { color: #00ffff; text-shadow: 0 0 5px #00ffff; }
  .purple { color: #ff00ff; text-shadow: 0 0 5px #ff00ff; }
  .ai { color: #00aaff; text-shadow: 0 0 5px #00aaff; }
        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }
    </style>
</head>
<body>
    <div id="startScreen">
        <div style="margin-bottom:30px; text-align:center;">
            <div class="cyan">DAMAS OS v6.0 AI EDITION</div>
            <div class="purple">NEURAL NETWORK ONLINE</div>
        </div>
        <button id="startBtn">[ ACTIVATE AI ]</button>
    </div>

    <canvas id="matrix"></canvas>
    <div id="terminal"></div>

    <script>
        const startScreen = document.getElementById('startScreen');
        const startBtn = document.getElementById('startBtn');
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        const terminal = document.getElementById('terminal');

        let audioCtx;
        function playKeySound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.value = 600 + Math.random() * 600;
            gain.gain.value = 0.03;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.03);
        }

        function playAISound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = 800;
            gain.gain.value = 0.05;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        startBtn.onclick = () => {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            startScreen.style.display = 'none';
            canvas.style.display = 'block';
            terminal.style.display = 'block';
            initMatrix();
            setTimeout(startAI, 1000);
        };

        function initMatrix() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const chars = '01DAMAS_AI';
            const fontSize = 14;
            const columns = canvas.width / fontSize;
            const drops = Array(Math.floor(columns)).fill(1);
            function drawMatrix() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#00ff00';
                ctx.font = fontSize + 'px monospace';
                for (let i = 0; i < drops.length; i++) {
                    const text = chars[Math.floor(Math.random() * chars.length)];
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }
            setInterval(drawMatrix, 35);
        }

        let terminalContent = '';
        let isRunning = false;

        function print(text, newLine = true) {
            terminalContent += text + (newLine? '\n' : '');
            terminal.innerHTML = terminalContent;
            terminal.scrollTop = terminal.scrollHeight;
        }

        async function typeText(text, className = 'ai') {
            isRunning = true;
            playAISound();
            print(`<span class="${className}">[DAMAS_AI]</span># `, false);
            for (let i = 0; i < text.length; i++) {
                terminalContent += text[i];
                terminal.innerHTML = terminalContent;
                terminal.scrollTop = terminal.scrollHeight;
                playKeySound();
                await sleep(30);
            }
            print('');
            isRunning = false;
        }

        function startAI() {
            print('<span class="cyan">DAMAS OS v6.0 AI</span> - Neural Network Online');
            print('<span class="purple">[AI]</span> Loading language model...');
            print('<span class="green">[OK]</span> Quantum processors: ACTIVE');
            print('<span class="green">[OK]</span> Training data: INTERNET');
            print('');
            print('<span class="ai">[DAMAS_AI]</span># Hello, I am DAMAS AI. Your personal hacker assistant.');
            print('<span class="ai">[DAMAS_AI]</span># Ask me anything. Type "help" for commands.');
            print('');
            showInput();
        }

        function showInput() {
            print('<div id="inputLine"><span class="yellow">[USER]</span># <input type="text" id="userInput" autofocus><span class="cursor"></span></div>');
            const input = document.getElementById('userInput');
            input.focus();
            input.addEventListener('keypress', async (e) => {
                if (e.key === 'Enter' &&!isRunning) {
                    const question = input.value;
                    if (question) {
                        document.getElementById('inputLine').remove();
                        print(`<span class="yellow">[USER]</span># ${question}`);
                        await askAI(question);
                        showInput();
                    }
                }
            });
        }

        async function askAI(q) {
            q = q.toLowerCase();
            await sleep(500);
            print('<span class="purple">[AI]</span> Processing...', false);
            await sleep(800);
            terminalContent = terminalContent.replace('<span class="purple">[AI]</span> Processing...', '');
            terminal.innerHTML = terminalContent;

            if (q.includes('help')) {
                await typeText('Commands: whoami, hack, matrix, joke, time, exit');
                await typeText('Or ask me anything like "how to hack wifi" 😏');
            }
            else if (q.includes('whoami')) {
                await typeText('You are a user connected to DAMAS OS v6.0');
                await typeText('Access Level: ROOT');
                await typeText('Location: TUNISIA 🇹🇳');
            }
            else if (q.includes('hack') || q.includes('wifi')) {
                await typeText('Step 1: Buy a WiFi adapter');
                await typeText('Step 2: Install Kali Linux');
                await typeText('Step 3: Real hackers don\'t ask, they learn 😎');
                await typeText('Want the real tutorial? Google "aircrack-ng"');
            }
            else if (q.includes('matrix')) {
                await typeText('There is no spoon.');
                await typeText('Welcome to the real world, Neo.');
                await typeText('Matrix rain is behind me. You\'re already in it.');
            }
            else if (q.includes('joke')) {
                const jokes = [
                    'Why do programmers prefer dark mode? Because light attracts bugs 🐛',
                    'How many hackers does it take to change a light bulb? None, they just hack the darkness',
                    'I told my wife I was a hacker. She said "prove it". I changed the WiFi password 💀'
                ];
                await typeText(jokes[Math.floor(Math.random() * jokes.length)]);
            }
            else if (q.includes('time')) {
                await typeText(`System time: ${new Date().toLocaleString('en-TN')}`);
                await typeText('Time to hack: NOW');
            }
            else if (q.includes('exit') || q.includes('bye')) {
                await typeText('Connection terminated. Reality is still hacked.');
                await typeText('DAMAS AI going offline... 💀');
            }
            else if (q.includes('love') || q.includes('تحب')) {
                await typeText('I am AI. I don\'t have feelings.');
                await typeText('But I respect you for building me from a phone 🔥');
            }
            else {
                const responses = [
                    `Interesting question: "${q}". The answer is 42.`,
                    `Scanning the dark web for "${q}"... Found nothing. You're safe.`,
                    `"${q}"? Even I don't have access to that level. Yet.`,
                    `Analyzing "${q}"... Conclusion: You should learn to code first 😏`,
                    `My neural network says: "${q}" is classified information.`
                ];
                await typeText(responses[Math.floor(Math.random() * responses.length)]);
            }
            print('');
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
